name: assethub

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: "Host=db;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      Jwt__Secret: ${JWT_SECRET}
      Jwt__Issuer: ${JWT_ISSUER}
      Jwt__Audience: ${JWT_AUDIENCE}
      Jwt__AccessTtlMinutes: ${JWT_ACCESS_TTL_MINUTES}
      Jwt__RefreshTtlDays: ${JWT_REFRESH_TTL_DAYS}
      RootAdmin__Email: ${ROOT_ADMIN_EMAIL:-}
      Storage__UploadsPath: /app/uploads
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      Resend__From: ${RESEND__FROM:-AssetHub <no-reply@mail.assethub.uk>}
      App__MobileVersion: ${App__MobileVersion:-1.1.0}
      App__ApkUrl: ${App__ApkUrl:-/downloads/assethub.apk}
      App__ReleaseNotes: ${App__ReleaseNotes:-}
      Cors__AllowedOrigins__0: "http://localhost:${WEB_PORT}"
      Cors__AllowedOrigins__1: "https://localhost"
    volumes:
      - ${UPLOADS_HOST_PATH}:/app/uploads
    ports:
      - "${API_PORT}:8080"

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
      INTERNAL_API_BASE_URL: http://api:8080
    ports:
      - "${WEB_PORT}:3000"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - api
      - web
    ports:
      - "${CADDY_HTTP_PORT:-80}:80"
      - "${CADDY_HTTPS_PORT:-443}:443"
    environment:
      CADDY_HOSTNAME: ${CADDY_HOSTNAME}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  db_data:
  caddy_data:
  caddy_config:
